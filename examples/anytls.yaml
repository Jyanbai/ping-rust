- address: 0.0.0.0:443
  protocol:
    type: tls
    tls_targets:
      proxy.example.com:
        cert: /etc/shoes/server.pem
        key: /etc/shoes/server-key.pem
        alpn_protocols:
          - h2
          - http/1.1
        protocol:
          type: anytls
          users:
            - name: default
              password: replace-with-a-long-random-password
          padding_scheme:
            - stop=8
            - 0=30-30
            - 1=50-100
          udp_enabled: true
