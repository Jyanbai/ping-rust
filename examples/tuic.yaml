- address: 0.0.0.0:443
  transport: quic
  quic_settings:
    cert: /etc/shoes/cert.pem
    key: /etc/shoes/key.pem
    alpn_protocols:
      - h3
  protocol:
    type: tuic
    uuid: d685aef3-b3c4-4932-9a9d-d0c2f6727dfa
    password: replace-with-a-random-password
    zero_rtt_handshake: false
  rules:
    - allow-all-direct
